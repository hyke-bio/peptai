<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Assembled Cubic Pep Agent -->
  
  <!-- HEAD -->
  <g transform="translate(24, 0)">
    <!-- Cubic head -->
    <polygon points="4,4 28,4 26,2 6,2" fill="#F5F5DC"/>
    <polygon points="2,6 4,4 4,28 2,26" fill="#E0E0C0"/>
    <polygon points="28,4 30,6 30,26 28,28" fill="#E0E0C0"/>
    <rect x="4" y="4" width="24" height="24" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
    
    <!-- Screen -->
    <rect x="8" y="10" width="16" height="12" fill="#1a3a1a" stroke="#1A1A1A" stroke-width="1"/>
    <rect x="10" y="13" width="3" height="3" fill="#40ff40"/>
    <rect x="19" y="13" width="3" height="3" fill="#40ff40"/>
    <rect x="13" y="18" width="6" height="2" fill="#40ff40"/>
    
    <!-- Antenna -->
    <rect x="14" y="0" width="4" height="4" fill="#1A1A1A"/>
    <rect x="15" y="-1" width="2" height="2" fill="#40ff40"/>
    
    <line x1="4" y1="4" x2="28" y2="4" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <polygon points="4,28 28,28 26,30 6,30" fill="#D0D0B0"/>
  </g>
  
  <!-- TORSO -->
  <g transform="translate(28, 32)">
    <polygon points="2,2 22,2 20,0 4,0" fill="#F5F5DC"/>
    <rect x="2" y="2" width="20" height="20" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
    
    <!-- Heart -->
    <g transform="translate(12, 12)">
      <rect x="-3" y="-4" width="2" height="2" fill="#40ff40"/>
      <rect x="1" y="-4" width="2" height="2" fill="#40ff40"/>
      <rect x="-4" y="-2" width="8" height="2" fill="#40ff40"/>
      <rect x="-3" y="0" width="6" height="2" fill="#40ff40"/>
      <rect x="-2" y="2" width="4" height="2" fill="#40ff40"/>
      <rect x="-1" y="4" width="2" height="1" fill="#40ff40"/>
    </g>
    
    <line x1="2" y1="2" x2="22" y2="2" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <polygon points="2,22 22,22 20,24 4,24" fill="#D0D0B0"/>
  </g>
  
  <!-- LEFT ARM -->
  <g transform="translate(16, 34)">
    <!-- Upper -->
    <rect x="1" y="1" width="6" height="10" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="1.5" y="2" width="2" height="8" fill="#E0E0C0"/>
    <circle cx="4" cy="11" r="2" fill="#1A1A1A"/>
    
    <!-- Lower -->
    <circle cx="4" cy="13" r="2" fill="#1A1A1A"/>
    <rect x="1" y="14" width="6" height="9" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="4.5" y="15" width="2" height="7" fill="#E0E0C0"/>
    <rect x="2" y="22" width="4" height="2" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1"/>
  </g>
  
  <!-- RIGHT ARM -->
  <g transform="translate(58, 34)">
    <!-- Upper -->
    <rect x="1" y="1" width="6" height="10" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="4.5" y="2" width="2" height="8" fill="#E0E0C0"/>
    <circle cx="4" cy="11" r="2" fill="#1A1A1A"/>
    
    <!-- Lower -->
    <circle cx="4" cy="13" r="2" fill="#1A1A1A"/>
    <rect x="1" y="14" width="6" height="9" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="1.5" y="15" width="2" height="7" fill="#E0E0C0"/>
    <rect x="2" y="22" width="4" height="2" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1"/>
  </g>
  
  <!-- LEFT LEG -->
  <g transform="translate(30, 56)">
    <!-- Upper -->
    <rect x="3" y="0" width="4" height="2" fill="#1A1A1A"/>
    <polygon points="2,2 8,2 9,12 1,12" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <polygon points="2.5,3 4.5,3 4.5,11 2.5,11" fill="#E0E0C0"/>
    <circle cx="5" cy="13" r="2.5" fill="#1A1A1A"/>
    
    <!-- Lower -->
    <circle cx="5" cy="17" r="2.5" fill="#1A1A1A"/>
    <polygon points="1,19 9,19 8,30 2,30" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <polygon points="5.5,20 7.5,20 7.5,29 6,29" fill="#E0E0C0"/>
    <rect x="1" y="30" width="8" height="3" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="0" y="32" width="10" height="1" fill="#1A1A1A"/>
  </g>
  
  <!-- RIGHT LEG -->
  <g transform="translate(42, 56)">
    <!-- Upper -->
    <rect x="3" y="0" width="4" height="2" fill="#1A1A1A"/>
    <polygon points="2,2 8,2 9,12 1,12" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <polygon points="5.5,3 7.5,3 7.5,11 6.5,11" fill="#E0E0C0"/>
    <circle cx="5" cy="13" r="2.5" fill="#1A1A1A"/>
    
    <!-- Lower -->
    <circle cx="5" cy="17" r="2.5" fill="#1A1A1A"/>
    <polygon points="1,19 9,19 8,30 2,30" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <polygon points="2.5,20 4.5,20 4.5,29 3,29" fill="#E0E0C0"/>
    <rect x="1" y="30" width="8" height="3" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="0" y="32" width="10" height="1" fill="#1A1A1A"/>
  </g>
</svg>
