<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <!-- Super Simple Pep Agent - Minimal Style -->
  
  <!-- HEAD -->
  <g transform="translate(14, 2)">
    <rect x="6" y="6" width="20" height="18" rx="3" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
    <circle cx="12" cy="14" r="2" fill="#1A1A1A"/>
    <circle cx="20" cy="14" r="2" fill="#1A1A1A"/>
    <line x1="13" y1="19" x2="19" y2="19" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <rect x="14" y="4" width="4" height="3" rx="1" fill="#1A1A1A"/>
  </g>
  
  <!-- BODY -->
  <g transform="translate(18, 28)">
    <rect x="4" y="2" width="16" height="16" rx="2" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
    <circle cx="12" cy="10" r="3" fill="#40ff40" opacity="0.3"/>
  </g>
  
  <!-- LEFT ARM -->
  <g transform="translate(10, 30)">
    <rect x="1" y="0" width="4" height="16" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  </g>
  
  <!-- RIGHT ARM -->
  <g transform="translate(46, 30)">
    <rect x="1" y="0" width="4" height="16" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  </g>
  
  <!-- LEFT LEG -->
  <g transform="translate(22, 46)">
    <rect x="2" y="0" width="4" height="18" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="1" y="17" width="6" height="3" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  </g>
  
  <!-- RIGHT LEG -->
  <g transform="translate(32, 46)">
    <rect x="2" y="0" width="4" height="18" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
    <rect x="1" y="17" width="6" height="3" rx="1" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  </g>
</svg>
