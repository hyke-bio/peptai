<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 18" width="10" height="18">
  <!-- Cubic lower leg segment -->
  
  <!-- Joint (black circle at top) -->
  <circle cx="5" cy="2" r="2.5" fill="#1A1A1A"/>
  
  <!-- Main cube (tapers down) -->
  <polygon points="1,4 9,4 8,15 2,15" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Side panel (darker) -->
  <polygon points="5.5,5 7.5,5 7.5,14 6,14" fill="#E0E0C0"/>
  
  <!-- Foot (rectangular base) -->
  <rect x="1" y="15" width="8" height="3" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="0" y="17" width="10" height="1" fill="#1A1A1A"/>
  
  <!-- Highlights -->
  <line x1="1" y1="4" x2="9" y2="4" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4"/>
</svg>
