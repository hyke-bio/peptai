<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 100" width="45" height="100">
  <!-- Top connector point (centered for head) -->
  <circle cx="40" cy="5" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Left half of body shell (cream egg shape) -->
  <path d="M 40 10
           C 20 10, 5 25, 5 55
           C 5 85, 20 100, 40 100
           L 40 10 Z"
        fill="#F5F5DC" 
        stroke="#1A1A1A" 
        stroke-width="2"/>
  
  <!-- Left half of heart symbol -->
  <path d="M 40 45
           C 40 45, 35 35, 28 35
           C 21 35, 20 42, 20 46
           C 20 55, 40 65, 40 65
           L 40 45 Z"
        fill="#1A1A1A"/>
  
  <!-- Center line (where it connects to right chest) -->
  <line x1="40" y1="10" x2="40" y2="100" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Bottom connector point (for legs) -->
  <circle cx="25" cy="95" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Left arm connector point -->
  <circle cx="8" cy="30" r="5" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
</svg>
