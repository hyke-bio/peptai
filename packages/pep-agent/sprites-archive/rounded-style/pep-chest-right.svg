<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 100" width="45" height="100">
  <!-- Top connector point (centered for head) -->
  <circle cx="5" cy="5" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Right half of body shell (cream egg shape) -->
  <path d="M 5 10
           L 5 100
           C 25 100, 40 85, 40 55
           C 40 25, 25 10, 5 10 Z"
        fill="#F5F5DC" 
        stroke="#1A1A1A" 
        stroke-width="2"/>
  
  <!-- Right half of heart symbol -->
  <path d="M 5 45
           L 5 65
           C 25 55, 25 46, 25 46
           C 25 42, 24 35, 17 35
           C 10 35, 5 45, 5 45 Z"
        fill="#1A1A1A"/>
  
  <!-- Center line (where it connects to left chest) -->
  <line x1="5" y1="10" x2="5" y2="100" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Bottom connector point (for legs) -->
  <circle cx="20" cy="95" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Right arm connector point -->
  <circle cx="37" cy="30" r="5" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
</svg>
