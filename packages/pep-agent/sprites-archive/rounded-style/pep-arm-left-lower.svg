<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 55" width="30" height="55">
  <!-- Top connector point (elbow joint) -->
  <circle cx="15" cy="5" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Lower arm (cream segment) -->
  <rect x="8" y="10" width="14" height="32" rx="7" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Hand (rounded with fingers) -->
  <ellipse cx="15" cy="47" rx="10" ry="6" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Fingers (two rounded protrusions) -->
  <ellipse cx="10" cy="50" rx="3" ry="4" fill="#1A1A1A"/>
  <ellipse cx="20" cy="50" rx="3" ry="4" fill="#1A1A1A"/>
</svg>
