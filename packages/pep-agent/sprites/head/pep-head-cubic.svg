<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cubic head with beveled edges -->
  
  <!-- Top bevel -->
  <polygon points="4,4 28,4 26,2 6,2" fill="#F5F5DC"/>
  
  <!-- Left side -->
  <polygon points="2,6 4,4 4,28 2,26" fill="#E0E0C0"/>
  
  <!-- Right side -->
  <polygon points="28,4 30,6 30,26 28,28" fill="#E0E0C0"/>
  
  <!-- Main cube face -->
  <rect x="4" y="4" width="24" height="24" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Screen (pixel display area) - darker green background -->
  <rect x="8" y="10" width="16" height="12" fill="#1a3a1a" stroke="#1A1A1A" stroke-width="1"/>
  
  <!-- Pixel eyes (neutral expression) -->
  <rect x="10" y="13" width="3" height="3" fill="#40ff40"/>
  <rect x="19" y="13" width="3" height="3" fill="#40ff40"/>
  
  <!-- Pixel mouth (neutral line) -->
  <rect x="13" y="18" width="6" height="2" fill="#40ff40"/>
  
  <!-- Antenna (cubic style) -->
  <rect x="14" y="0" width="4" height="4" fill="#1A1A1A"/>
  <rect x="15" y="-1" width="2" height="2" fill="#40ff40"/>
  
  <!-- Edge highlights -->
  <line x1="4" y1="4" x2="28" y2="4" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="4" y1="4" x2="4" y2="28" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- Bottom bevel -->
  <polygon points="4,28 28,28 26,30 6,30" fill="#D0D0B0"/>
</svg>
