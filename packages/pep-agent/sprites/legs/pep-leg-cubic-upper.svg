<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 14" width="10" height="14">
  <!-- Cubic upper leg segment -->
  
  <!-- Top connection -->
  <rect x="3" y="0" width="4" height="2" fill="#1A1A1A"/>
  
  <!-- Main cube (slightly wider at top) -->
  <polygon points="2,2 8,2 9,12 1,12" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Side panel (darker) -->
  <polygon points="2.5,3 4.5,3 4.5,11 2.5,11" fill="#E0E0C0"/>
  
  <!-- Joint (black circle at bottom) -->
  <circle cx="5" cy="13" r="2.5" fill="#1A1A1A"/>
  
  <!-- Highlights -->
  <line x1="2" y1="2" x2="8" y2="2" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="2" y1="2" x2="1" y2="12" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
</svg>
