<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- Top connector point -->
  <circle cx="40" cy="5" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Body shell (cream egg shape) -->
  <ellipse cx="40" cy="55" rx="35" ry="45" fill="#F5F5DC" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Heart symbol -->
  <path d="M 40 45 
           C 40 45, 35 35, 28 35
           C 21 35, 20 42, 20 46
           C 20 55, 40 65, 40 65
           C 40 65, 60 55, 60 46
           C 60 42, 59 35, 52 35
           C 45 35, 40 45, 40 45 Z" 
        fill="#1A1A1A"/>
  
  <!-- Bottom connector point -->
  <circle cx="40" cy="95" r="6" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  
  <!-- Arm connector points (left and right) -->
  <circle cx="8" cy="30" r="5" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
  <circle cx="72" cy="30" r="5" fill="#1A1A1A" stroke="#000000" stroke-width="1"/>
</svg>
