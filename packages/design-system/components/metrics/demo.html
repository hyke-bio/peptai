<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metrics - PeptAI</title>
  <link rel="stylesheet" href="../../tokens/colors.css">
  <link rel="stylesheet" href="../../tokens/typography.css">
  <link rel="stylesheet" href="../../tokens/spacing.css">
  <link rel="stylesheet" href="metric.css">
  <style>
    body {
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      padding: var(--space-2);
    }
    h1, h2 {
      color: var(--color-text-primary);
      margin: var(--space-2) 0 var(--space-1);
    }
    h2 {
      padding-bottom: var(--gap);
      border-bottom: var(--border-width) dashed var(--color-border-tertiary);
    }
  </style>
</head>
<body>
  <h1>Metrics Component</h1>
  
  <h2>Single Metric</h2>
  <div class="metric">
    <div class="metric-label">Active Agents</div>
    <div class="metric-value">7</div>
  </div>
  
  <h2>Metric Grid</h2>
  <div class="metric-grid">
    <div class="metric">
      <div class="metric-label">Total Sequences</div>
      <div class="metric-value">1,234</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Candidates</div>
      <div class="metric-value">87</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Success Rate</div>
      <div class="metric-value">94.2%</div>
    </div>
  </div>
  
  <h2>Extended Grid</h2>
  <div class="metric-grid">
    <div class="metric">
      <div class="metric-label">Active Agents</div>
      <div class="metric-value">7</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Running Tasks</div>
      <div class="metric-value">14</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Completed</div>
      <div class="metric-value">156</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Avg Runtime</div>
      <div class="metric-value">2.4h</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Success Rate</div>
      <div class="metric-value">98.7%</div>
    </div>
    
    <div class="metric">
      <div class="metric-label">Total Cost</div>
      <div class="metric-value">$234</div>
    </div>
  </div>
</body>
</html>
