<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pept Visual System - Dashboard Example</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/spacing.css">
  <link rel="stylesheet" href="../components/cards/card.css">
  <link rel="stylesheet" href="../components/metrics/metric.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      padding: 12px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--color-border-tertiary);
    }
    
    .title {
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .subtitle {
      font-size: 13px;
      color: var(--color-text-tertiary);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    
    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">[ PEPT VISUAL SYSTEM ]</div>
      <div class="subtitle">Dashboard component example</div>
    </div>
    
    <div class="grid">
      <div class="card">
        <div class="card-header">[ OVERVIEW ]</div>
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">Status</div>
            <div class="metric-value">Active</div>
          </div>
          <div class="metric">
            <div class="metric-label">Version</div>
            <div class="metric-value">1.0.0</div>
          </div>
          <div class="metric">
            <div class="metric-label">Type</div>
            <div class="metric-value">System</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">[ COMPONENTS ]</div>
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">Cards</div>
            <div class="metric-value">3</div>
          </div>
          <div class="metric">
            <div class="metric-label">Metrics</div>
            <div class="metric-value">12</div>
          </div>
          <div class="metric">
            <div class="metric-label">Tokens</div>
            <div class="metric-value">24</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">[ STATISTICS ]</div>
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">Lines</div>
            <div class="metric-value">500</div>
          </div>
          <div class="metric">
            <div class="metric-label">Size</div>
            <div class="metric-value">12KB</div>
          </div>
          <div class="metric">
            <div class="metric-label">Files</div>
            <div class="metric-value">8</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
